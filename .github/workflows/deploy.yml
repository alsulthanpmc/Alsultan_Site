name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Deploy via webhook
        env:
          WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: HOSTINGER_WEBHOOK secret is not set"
            exit 1
          fi
          curl --fail-with-body -X POST -H "Content-Type: application/json" -d '{}' "$WEBHOOK_URL"
